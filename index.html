<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Characters Archive</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#00ff88;
    font-family:monospace;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:
    repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,255,136,.05) 3px
    );
}

.container{
    text-align:center;
    z-index:2;
}

h1{
    font-size:3rem;
    letter-spacing:5px;
    margin-bottom:20px;
    text-shadow:0 0 15px #00ff88;
}

p{
    margin-bottom:40px;
    opacity:.8;
}

button{
    padding:15px 40px;
    background:transparent;
    border:2px solid #00ff88;
    color:#00ff88;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00ff88;
    color:black;
    box-shadow:0 0 20px #00ff88;
}

</style>
</head>

<body>

<div class="container">

<h1>RISK FILES DATABASE</h1>

<p>AUTHORIZED PERSONNEL ONLY</p>

<button onclick="location.href='files.html'">

</button>

</div>

</body>
</html>
